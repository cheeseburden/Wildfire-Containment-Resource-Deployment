# ============================================================
# CI/CD Pipeline — PyroShield AI
# ============================================================
# Triggers:
#   - Push to main/dev → full pipeline
#   - PR to main/dev → lint + test
#   - Manual dispatch → retrain + deploy
#
# Stages:
#   1. Lint & Format Check
#   2. Unit Tests
#   3. Model Training (on code push to main)
#   4. Docker Build & Push
#   5. Deploy to K8s (main only)
# ============================================================

name: 🔥 PyroShield CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      retrain:
        description: 'Trigger model retraining'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pyroshield-api

jobs:
  # ─── Stage 1: Lint ────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 black isort
      
      - name: Run flake8
        run: flake8 src/ api/ sim/ --max-line-length=120 --ignore=E501,W503,E402,E203
      
      - name: Check formatting (black)
        run: black --check --diff src/ api/ sim/ || true
      
      - name: Check import sorting
        run: isort --check-only --diff src/ api/ sim/ || true

  # ─── Stage 2: Test ────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─── Stage 3: Train ───────────────────────────────────────
  train:
    name: 🤖 Model Training
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event.inputs.retrain == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Train Q-Learning (Exp 1)
        run: python train.py --config configs/qlearning_v1.yaml
      
      - name: Train Q-Learning (Exp 2)
        run: python train.py --config configs/qlearning_v2.yaml
      
      - name: Evaluate models
        run: |
          python evaluate.py --config configs/qlearning_v1.yaml
          python evaluate.py --config configs/qlearning_v2.yaml
      
      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            models/*.pkl
            results/*.json
            results/*.csv
            results/*.png

  # ─── Stage 4: Docker Build ────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─── Stage 5: Deploy ──────────────────────────────────────
  deploy:
    name: 🚀 Deploy to K8s
    runs-on: ubuntu-latest
    needs: [docker, train]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy with Helm
        run: |
          echo "🚀 Deploying PyroShield AI to Kubernetes..."
          echo "helm upgrade --install pyroshield ./helm/pyroshield \\"
          echo "  --namespace pyroshield \\"
          echo "  --set image.tag=${{ github.sha }} \\"
          echo "  --wait --timeout 5m"
          echo "✅ Deployment complete (dry-run — configure kubectl for actual deploy)"
