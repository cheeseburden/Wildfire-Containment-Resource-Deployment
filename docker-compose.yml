# ============================================================
# Docker Compose — Full PyroShield AI Stack
# ============================================================
# Services:
#   1. api         — FastAPI prediction service
#   2. mlflow      — MLflow tracking server
#   3. prometheus  — Metrics collection
#   4. trainer     — One-shot training job
# ============================================================

version: "3.9"

services:
  # --- API Service ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyroshield-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/policy_exp-qlearning-1_final.pkl
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pyroshield-net

  # --- MLflow Tracking Server ---
  mlflow:
    image: python:3.11-slim
    container_name: pyroshield-mlflow
    command: >
      bash -c "pip install mlflow==2.11.0 --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns
      - mlflow-db:/mlflow.db
    restart: unless-stopped
    networks:
      - pyroshield-net

  # --- Prometheus Monitoring ---
  prometheus:
    image: prom/prometheus:latest
    container_name: pyroshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - pyroshield-net

  # --- Training Job (one-shot) ---
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyroshield-trainer
    command: >
      python train.py --config configs/qlearning_v1.yaml
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models
      - ./results:/app/results
      - ./configs:/app/configs:ro
    depends_on:
      - mlflow
    profiles:
      - training
    networks:
      - pyroshield-net

volumes:
  mlflow-data:
  mlflow-db:

networks:
  pyroshield-net:
    driver: bridge
