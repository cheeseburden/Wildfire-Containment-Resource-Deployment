# Default values for PyroShield AI Helm chart
# This is a YAML-formatted file.
# Override with: helm install pyroshield ./helm/pyroshield -f custom-values.yaml

replicaCount: 2

image:
  repository: ghcr.io/cheeseburden/pyroshield-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: pyroshield.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

config:
  modelPath: "models/policy_exp-qlearning-1_final.pkl"
  mlflowUri: "http://mlflow-svc:5000"
  logLevel: "INFO"
  apiHost: "0.0.0.0"
  apiPort: "8000"

monitoring:
  prometheus:
    enabled: true
    scrapeInterval: "10s"

mlflow:
  enabled: true
  trackingUri: "http://mlflow-svc:5000"
