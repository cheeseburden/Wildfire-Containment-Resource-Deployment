# =============================================================
# Configuration: Multi-Algorithm Training — SARSA
# =============================================================
# On-policy alternative — more conservative resource deployment.
# Run: python src/tracking.py --config configs/sarsa_v1.yaml --algorithm sarsa

experiment_name: "exp-sarsa-1"
algorithm: "sarsa"

# --- Environment ---
env:
  grid_size: 10
  num_resources: 2
  base_spread_prob: 0.3
  wind_spread_bonus: 0.2
  wind_direction: "N"
  max_steps: 50
  num_initial_fires: 2
  tree_density: 0.85
  num_sectors_per_side: 2

# --- Agent ---
agent:
  learning_rate: 0.1
  discount_factor: 0.95
  epsilon: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.995

# --- Training ---
training:
  episodes: 800
  log_interval: 100
  save_policy_at: [400, 800]
  policy_dir: "models/"
