# DVC Pipeline — Reproducible ML Workflow
# ==========================================
# Run: dvc repro
# This executes the full pipeline in dependency order.

stages:
  generate_data:
    cmd: python -m src.data.generate
    deps:
      - src/data/generate.py
      - sim/wildfire_env.py
    outs:
      - data/raw/trajectories.json
      - data/raw/episode_stats.csv
    params:
      - configs/qlearning_v1.yaml:
        - env

  clean_data:
    cmd: python -m src.data.clean
    deps:
      - src/data/clean.py
      - data/raw/trajectories.json
    outs:
      - data/processed/trajectories_clean.json
      - data/processed/cleaning_report.json

  train_qlearning:
    cmd: python train.py --config configs/qlearning_v1.yaml
    deps:
      - train.py
      - src/agent.py
      - sim/wildfire_env.py
      - configs/qlearning_v1.yaml
    outs:
      - models/policy_exp-qlearning-1_final.pkl
    metrics:
      - results/log_exp-qlearning-1.json:
          cache: false

  train_experiment_2:
    cmd: python train.py --config configs/qlearning_v2.yaml
    deps:
      - train.py
      - src/agent.py
      - sim/wildfire_env.py
      - configs/qlearning_v2.yaml
    outs:
      - models/policy_exp-qlearning-2_final.pkl
    metrics:
      - results/log_exp-qlearning-2.json:
          cache: false

  evaluate:
    cmd: >
      python evaluate.py --config configs/qlearning_v1.yaml &&
      python evaluate.py --config configs/qlearning_v2.yaml
    deps:
      - evaluate.py
      - models/policy_exp-qlearning-1_final.pkl
      - models/policy_exp-qlearning-2_final.pkl
    metrics:
      - results/evaluation_exp-qlearning-1.json:
          cache: false
      - results/evaluation_exp-qlearning-2.json:
          cache: false
    plots:
      - results/reward_curve_exp-qlearning-1.png
      - results/burned_area_curve_exp-qlearning-1.png
